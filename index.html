<!DOCTYPE html>
<html>
<head>
    <title>learn simply</title>
    <link href="webdev.jpg" type="image/x-icon" rel="icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        img, video {
            max-width: 100%;
            width: 700px;
            height: auto;
            border-radius: 8px;
        }
        audio {
            width: 400px;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <h1>welcome to our multi-media project</h1>
    <br>

    <h2>paragraphs and text formatting</h2>
    <p>
        this is a <b>bold</b> text and this is <i>italic</i>. we can also use <u>underline</u> and <del>strikethrough</del>
    </p>
    <br>

    <h2>images</h2>
    <img src="web.jpg">
    <br><br>

    <h2>audio</h2>
    <audio controls loop src="programmib.music.mp3"></audio>
    <br><br>

    <h2>video</h2>
    <video controls loop muted src="progg.mp4" poster="progg.photo.jpg"></video>
    <br><br>

    <h1>created by: Mohamed Hany</h1>

</body>
</html>
